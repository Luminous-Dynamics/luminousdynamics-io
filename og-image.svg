<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0b0d"/>

  <!-- Gradient Circles -->
  <circle cx="200" cy="315" r="300" fill="url(#gradient1)" opacity="0.1"/>
  <circle cx="1000" cy="315" r="300" fill="url(#gradient2)" opacity="0.1"/>

  <!-- Content -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#e8eaed" text-anchor="middle">
    Luminous Dynamics
  </text>

  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#00e5ff" text-anchor="middle">
    Developer Portal
  </text>

  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a8b2c1" text-anchor="middle">
    Build Sacred Technology That Serves Consciousness
  </text>

  <!-- Features -->
  <g transform="translate(250, 400)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#00e5ff">✓</text>
    <text x="30" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e8eaed">Terra Atlas API</text>
  </g>

  <g transform="translate(480, 400)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#ffd740">✓</text>
    <text x="30" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e8eaed">Luminous Nix</text>
  </g>

  <g transform="translate(680, 400)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#b388ff">✓</text>
    <text x="30" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e8eaed">Sacred Bridge</text>
  </g>

  <!-- URL -->
  <text x="600" y="520" font-family="monospace" font-size="20" fill="#6b7785" text-anchor="middle">
    luminousdynamics.io
  </text>

  <!-- Lightning Icon -->
  <text x="600" y="580" font-size="48" text-anchor="middle">⚡</text>

  <!-- Gradients -->
  <defs>
    <radialGradient id="gradient1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="gradient2">
      <stop offset="0%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
