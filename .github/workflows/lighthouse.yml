name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start local server
        run: |
          npx http-server . -p 8080 &
          sleep 5

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: |
            .lighthouseci/
            lhci_reports/
          retention-days: 30

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '.lighthouseci';

            if (fs.existsSync(path)) {
              const comment = `
              ## ⚡ Lighthouse CI Results

              Performance audit completed! Check the artifacts for detailed reports.

              ### Key Metrics
              - 🎯 Performance: Check artifacts
              - ♿ Accessibility: Check artifacts
              - 🎨 Best Practices: Check artifacts
              - 🔍 SEO: Check artifacts
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  web-vitals:
    name: Core Web Vitals Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check bundle size
        run: |
          echo "Checking JavaScript bundle sizes..."
          find js -name "*.js" -exec du -h {} \; | sort -h
          total=$(find js -name "*.js" -exec du -b {} + | awk '{sum+=$1} END {print sum}')
          total_kb=$((total / 1024))
          echo "Total JS size: ${total_kb}KB"

          if [ $total_kb -gt 200 ]; then
            echo "⚠️ Warning: JS bundle exceeds 200KB"
          else
            echo "✅ JS bundle size is acceptable"
          fi

      - name: Check CSS size
        run: |
          echo "Checking CSS bundle sizes..."
          find styles -name "*.css" -exec du -h {} \; | sort -h
          total=$(find styles -name "*.css" -exec du -b {} + | awk '{sum+=$1} END {print sum}')
          total_kb=$((total / 1024))
          echo "Total CSS size: ${total_kb}KB"

          if [ $total_kb -gt 100 ]; then
            echo "⚠️ Warning: CSS bundle exceeds 100KB"
          else
            echo "✅ CSS bundle size is acceptable"
          fi
