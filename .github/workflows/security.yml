name: Security Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          npm outdated || true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check security headers
        run: |
          echo "Checking for security-related meta tags..."

          if grep -q "X-Content-Type-Options" index.html; then
            echo "✅ X-Content-Type-Options found"
          else
            echo "⚠️ X-Content-Type-Options missing"
          fi

          if grep -q "X-Frame-Options" index.html; then
            echo "✅ X-Frame-Options found"
          else
            echo "⚠️ X-Frame-Options missing"
          fi

          if grep -q "referrer" index.html; then
            echo "✅ Referrer Policy found"
          else
            echo "⚠️ Referrer Policy missing"
          fi

  create-issue:
    name: Create Security Issue
    runs-on: ubuntu-latest
    needs: [npm-audit, codeql, secret-scan]
    if: failure()

    steps:
      - name: Create issue for security findings
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = '🔒 Security Audit Failed';
            const body = `
            ## Security Audit Alert

            The scheduled security audit has detected potential issues.

            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Actions Taken
            - NPM Audit: ${{ needs.npm-audit.result }}
            - CodeQL Analysis: ${{ needs.codeql.result }}
            - Secret Scanning: ${{ needs.secret-scan.result }}

            ### Next Steps
            1. Review the workflow logs
            2. Address any vulnerabilities found
            3. Update dependencies if needed
            4. Re-run the security audit

            **Priority:** High
            **Auto-generated:** Yes
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated']
            });
